name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install -e . --no-deps
      - run: ruff check .
      - run: pytest -q
      - run: customer360 demo --root data --days 2 --watch-events 100 --search-events 20 --invalid-events 2
      - uses: actions/upload-artifact@v4
        with:
          name: customer360-quality-evidence
          path: artifacts/quality-report.json
